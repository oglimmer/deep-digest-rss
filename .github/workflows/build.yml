name: Build & push images

# Builds the changed component images (backend / frontend / scraper) and pushes
# them to registry.oglimmer.com via the repo's oglimmer.sh, on the in-cluster
# self-hosted ARC runner (arm64, Docker-in-Docker). Only the components whose
# files changed are built (mirrors pr.yml). The runner has no kubectl, so
# oglimmer.sh triggers the rollout via the restart hook (restart.oglimmer.com)
# using the RESTART_TOKEN secret passed in the environment.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One build per ref; cancel superseded pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the repo changed so we only build the relevant images.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      scraper: ${{ steps.filter.outputs.scraper }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - 'news-backend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'
            frontend:
              - 'news-frontend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'
            scraper:
              - 'scraper/**'
              - '!scraper/lib/**'
              - '!scraper/bin/**'
              - '!scraper/node_modules/**'
              - '!scraper/__pycache__/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: arc-deep-digest-rss   # in-cluster ARC runner scale set
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # No kubectl on the runner, so the rollout goes through the restart hook
      # (oglimmer.sh falls back to it when RESTART_TOKEN is set).
      - name: Build, push & restart backend
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build -b --verbose

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: arc-deep-digest-rss
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build, push & restart frontend
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build -f --verbose

  scraper:
    needs: changes
    if: ${{ needs.changes.outputs.scraper == 'true' }}
    runs-on: arc-deep-digest-rss
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to registry.oglimmer.com
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: registry.oglimmer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Scraper maps to two deployments (news-scraper, news-taggroupper);
      # oglimmer.sh restarts both via the hook.
      - name: Build, push & restart scraper
        env:
          RESTART_TOKEN: ${{ secrets.RESTART_TOKEN }}
        run: ./oglimmer.sh build -s --verbose
