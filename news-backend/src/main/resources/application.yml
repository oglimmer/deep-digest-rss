---
spring:
  config:
    import: "classpath:news-properties.yml"
  application:
    name: "news"
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:news_prod}"
    username: "${DB_USERNAME:news}"
    password: "${DB_PASSWORD:news}"
    driver-class-name: "org.postgresql.Driver"
  jpa:
    hibernate:
      ddl-auto: "validate"
    open-in-view: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
  session:
    store-type: "redis"
    timeout: "30d"
    redis:
      flush-mode: "on-save"
      namespace: "ddrss:session"
  ai:
    mcp:
      server:
        name: "deep-digest-rss"
        version: "0.0.1"
        protocol: "STREAMABLE"
        streamable-http:
          mcp-endpoint: "/mcp"
logging:
  level:
    root: "INFO"
    org.hibernate.SQL: "DEBUG"
    de.oglimmer: "DEBUG"
server:
  port: 8080
  address: "0.0.0.0"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-components: "when-authorized"
      show-details: "when-authorized"
      roles: "ADMIN"
      probes:
        enabled: true
  info:
    git:
      mode: "full"
      enabled: true
    java:
      enabled: true
    env:
      enabled: true
    build:
      enabled: true
    os:
      enabled: true
app:
  cookie-secure: "${COOKIE_SECURE:true}"
  session:
    absolute-timeout-days: "${SESSION_ABSOLUTE_TIMEOUT_DAYS:90}"
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173}"
  rate-limit:
    login-per-email-per-15m: "${RATE_LIMIT_LOGIN_EMAIL:5}"
    login-per-ip-per-15m: "${RATE_LIMIT_LOGIN_IP:20}"
  security:
    csrf-enabled: "${CSRF_ENABLED:false}"
  mcp:
    issuer-uri: "${MCP_ISSUER_URI:http://localhost:8080}"
    cors-allowed-origins: "${MCP_CORS_ALLOWED_ORIGINS:*}"
    dynamic-client-registration-enabled: "${MCP_DCR_ENABLED:true}"
    token:
      access-token-ttl: "${MCP_ACCESS_TOKEN_TTL:30m}"
      refresh-token-ttl: "${MCP_REFRESH_TOKEN_TTL:180d}"
    jwk:
      private-key: "${MCP_JWK_PRIVATE_KEY:}"
      public-key: "${MCP_JWK_PUBLIC_KEY:}"
daily-digest:
  discord-webhook-urls: "${DISCORD_WEBHOOK_URLS:}"
  model: "${MODEL:}"
  api-key: "${API_KEY:}"
  generation-engine: "${GENERATION_ENGINE:}"
  anthropic-api-key: "${ANTHROPIC_API_KEY:}"
  anthropic-model: "${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}"
