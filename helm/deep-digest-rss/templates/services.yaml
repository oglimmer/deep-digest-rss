apiVersion: v1
kind: Service
metadata:
  name: news-backend-service
  labels:
    {{- include "deep-digest-rss.labels" . | nindent 4 }}
spec:
  selector:
    run: news-backend
  ports:
    - name: news-backend
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: news-frontend-service
  labels:
    {{- include "deep-digest-rss.labels" . | nindent 4 }}
spec:
  selector:
    run: news-frontend
  ports:
    - name: news-frontend
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: news-auth-service
  labels:
    {{- include "deep-digest-rss.labels" . | nindent 4 }}
spec:
  selector:
    run: news-auth
  ports:
    - name: news-auth
      protocol: TCP
      port: 3000
      targetPort: 3000
