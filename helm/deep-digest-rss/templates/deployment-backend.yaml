apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-backend
  labels:
    run: news-backend
    {{- include "deep-digest-rss.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      run: news-backend
  template:
    metadata:
      labels:
        run: news-backend
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: news-backend
          image: {{ .Values.image.registry }}/{{ .Values.backend.image }}:{{ .Values.backend.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx1500m"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: DB_NAME
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: SERVER_PORT
            - name: AUTH_ACTUATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: AUTH_ACTUATOR_PASSWORD
            - name: AUTH_SWAGGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: AUTH_SWAGGER_PASSWORD
            - name: AUTH_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: AUTH_WRITE_PASSWORD
            - name: APP_EXTERNAL_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: APP_EXTERNAL_DOMAIN
            - name: DISCORD_WEBHOOK_URLS
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: DISCORD_WEBHOOK_URLS
            - name: MODEL
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: MODEL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: ANTHROPIC_API_KEY
            - name: GENERATION_ENGINE
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: GENERATION_ENGINE
            - name: REDIS_HOST
              value: "redis-service"
            - name: SCRAPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: SCRAPER_API_KEY
                  optional: true
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: CORS_ALLOWED_ORIGINS
            - name: CSRF_ENABLED
              value: "false"
            - name: MCP_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: MCP_ISSUER_URI
            - name: MCP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: news-config
                  key: MCP_CORS_ALLOWED_ORIGINS
            - name: MCP_JWK_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: MCP_JWK_PRIVATE_KEY
                  optional: true
            - name: MCP_JWK_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: news-secrets
                  key: MCP_JWK_PUBLIC_KEY
                  optional: true
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            # ~5 minutes for the JVM + Flyway + Hibernate to come up.
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
