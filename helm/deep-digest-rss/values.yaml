image:
  registry: registry.oglimmer.com
  pullSecret: oglimmerregistrykey

# Pods only schedule onto nodes labelled `dedicated=news-system`. Keep at least two nodes
# labelled: with only one, a rolling update cannot place the new pod until the old one exits,
# and the backend has to share whatever else lives there. Label a node with:
#   kubectl label node <node> dedicated=news-system
nodeSelector:
  dedicated: news-system

domain: news.oglimmer.com

backend:
  image: news-backend
  tag: latest
  replicas: 1
  resources:
    requests:
      # CPU requests set the pod's scheduler weight, not just its placement. At 25m the
      # backend was entitled to ~0.6% of a contended node and was starved by its
      # neighbours until the health probes timed out and it got killed. The large list
      # endpoints are CPU-bound on JSON serialisation, so give it a real share.
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2000Mi"
      cpu: "2"

frontend:
  image: news-frontend
  tag: latest
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "25m"
    limits:
      memory: "512Mi"
      cpu: "250m"

scraper:
  image: news-scraper
  tag: latest
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "25m"
    limits:
      memory: "712Mi"
      cpu: "250m"

taggroupper:
  image: news-scraper
  tag: latest
  replicas: 1
  command: ["./run.sh", "taggroups"]
  resources:
    requests:
      memory: "128Mi"
      cpu: "25m"
    limits:
      memory: "512Mi"
      cpu: "250m"

config:
  # Central PostgreSQL service shared across apps (see also the wiki chart). Credentials
  # live in the news-secrets sealed secret as SPRING_DATASOURCE_USERNAME / _PASSWORD.
  dbHost: postgres.default.svc.cluster.local
  dbPort: "5432"
  dbName: news_prod
  serverPort: "8080"
  externalDomain: https://news.oglimmer.com
  apiUrl: https://news.oglimmer.com
  noEnvFile: "true"
  username: write
  model: gpt-4o-mini
  generationEngine: chatgpt
  corsAllowedOrigins: https://news.oglimmer.com
  # MCP OAuth issuer (must be the externally reachable base URL) and CORS origins.
  mcpIssuerUri: https://news.oglimmer.com
  mcpCorsAllowedOrigins: https://claude.ai

ingress:
  tls:
    secretName: tls-news-frontend-ingress-dns
  certManager:
    clusterIssuer: oglimmer-com-dns
