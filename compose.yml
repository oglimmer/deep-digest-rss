services:
  frontend:
    build: news-frontend
    ports:
      - "5173:80"
    environment:
      - API_URL=http://localhost:8888
  backend:
    build: news-backend
    ports:
      - "8888:8888"
    environment:
      - DB_HOST=database
      - REDIS_HOST=redis
      - COOKIE_SECURE=false
      - AUTH_ACTUATOR_PASSWORD=xxx
      - AUTH_SWAGGER_PASSWORD=xxx
      - AUTH_WRITE_PASSWORD=write
      - SCRAPER_API_KEY=local-dev-scraper-key
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - CSRF_ENABLED=false
      - APP_EXTERNAL_DOMAIN=http://localhost:8888
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  database:
    image: mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=news_prod
      - MYSQL_USER=news
      - MYSQL_PASSWORD=news
    healthcheck:
      test: mariadb -unews -pnews news_prod -e "select 1"
      interval: 10s
      timeout: 60s
      retries: 5
    ports:
      - "3306:3306"
  scraper:
    build: scraper
    environment:
      - NO_ENV_FILE=true
      - SCRAPER_API_KEY=${SCRAPER_API_KEY:-local-dev-scraper-key}
      - URL=${URL:?No URL defined}
      - MODEL=${MODEL:?No model defined}
      - API_KEY=${API_KEY:?No API KEY defined}
      - GENERATION_ENGINE=${GENERATION_ENGINE:?No generation engine defined}
  scraper-tags:
    build: scraper
    command: ["./run.sh", "taggroups"]
    environment:
      - SCRAPER_API_KEY=${SCRAPER_API_KEY:-local-dev-scraper-key}
      - URL=${URL:?No URL defined}
      - MODEL=${MODEL:?No model defined}
      - API_KEY=${API_KEY:?No API KEY defined}
      - GENERATION_ENGINE=${GENERATION_ENGINE:?No generation engine defined}
